<div class="min-h-screen flex items-center justify-center bg-[#070b14] text-white relative overflow-hidden font-sans">

  <!-- Glow background -->
  <div class="absolute w-[500px] h-[500px] bg-blue-500/10 blur-[120px] rounded-full -top-32 -left-32"></div>
  <div class="absolute w-[400px] h-[400px] bg-purple-500/10 blur-[120px] rounded-full -bottom-32 -right-32"></div>

  <!-- Card -->
  <div class="relative z-10 w-full max-w-md p-8 rounded-2xl bg-white/5 backdrop-blur-xl border border-white/10 shadow-2xl">

    <!-- Brand -->
    <div class="mb-8">
      <h1 class="text-xl font-semibold tracking-tight">
        Sistema de Almacén
      </h1>
      <p class="text-sm text-gray-400">
        Gestión inteligente de inventario
      </p>
    </div>

    <!-- Title -->
    <div class="mb-8">
      <h2 class="text-3xl font-semibold">
        Iniciar sesión
      </h2>
      <p class="text-gray-400 text-sm mt-1">
        Accede con tu cuenta institucional
      </p>
    </div>

    <!-- Google Button -->
    <button
      (click)="loginConGoogle()"
      class="w-full flex items-center justify-center gap-3 py-3 rounded-lg 
             bg-white text-black font-medium 
             hover:bg-gray-200 
             transition-all duration-200
             hover:shadow-[0_0_20px_rgba(59,130,246,0.25)]"
    >
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5">
      Continuar con Google
    </button>

    <!-- Divider -->
    <div class="flex items-center my-6">
      <div class="flex-1 h-px bg-white/10"></div>
      <span class="px-3 text-xs text-gray-500">Acceso seguro</span>
      <div class="flex-1 h-px bg-white/10"></div>
    </div>

    <!-- Roles -->
    <div class="flex gap-2 flex-wrap">
      <span class="px-3 py-1 text-xs rounded-full border border-white/10 text-gray-300 hover:border-blue-400/40 hover:text-blue-300 transition">
        Empleado
      </span>
      <span class="px-3 py-1 text-xs rounded-full border border-white/10 text-gray-300 hover:border-purple-400/40 hover:text-purple-300 transition">
        Maestro
      </span>
      <span class="px-3 py-1 text-xs rounded-full border border-white/10 text-gray-300 hover:border-blue-400/40 hover:text-blue-300 transition">
        Alumno
      </span>
    </div>

  </div>

  <!-- Footer -->
  <p class="absolute bottom-6 text-xs text-gray-500">
    © 2025 Sistema de Almacén
  </p>

</div>
